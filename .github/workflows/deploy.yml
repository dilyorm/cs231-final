name: Deploy

on:
  push:
    branches: [main, dev]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            if [ "${{ github.ref_name }}" = "main" ]; then
              DIR=/opt/cs231
              SERVICE=cs231
            else
              DIR=/opt/cs231-dev
              SERVICE=cs231-dev
            fi

            # Pull latest
            cd $DIR
            git fetch origin
            git checkout ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}

            # Backend deps
            pip install -r backend/requirements.txt -q \
              --break-system-packages --ignore-installed 2>/dev/null || true

            # Frontend build
            cd $DIR/frontend
            npm ci --silent
            npm run build

            # Restart service (running as root, no sudo needed)
            systemctl restart $SERVICE
